# =========================================================================
# Development Profile — H2 In-Memory Database (No external DB required for dev)
# =========================================================================

# Server
server.port=${PORT:8080}

# H2 Database Config
spring.datasource.url=jdbc:h2:mem:travel_simulator_dev;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (accessible at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# JPA / Hibernate Setup
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

# JWT Configuration
travelsimulator.jwt.secret=super_secret_jwt_key_at_least_256_bits_long_for_security_reasons_12345
travelsimulator.jwt.expiration-ms=86400000

# API Settings (read from environment if present, or leave empty)
travelsimulator.weather.api-key=${WEATHER_API_KEY:}
travelsimulator.ai.provider=${LLM_PROVIDER:gemini}
travelsimulator.ai.api-key=${LLM_API_KEY:}

# File upload sizes
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
