# =========================================================================
# Production Profile — MySQL Database (Railway / Render managed DB)
# =========================================================================

# Server Port (dynamic port injected by Railway/Render, defaults to 8080)
server.port=${PORT:8080}

# MySQL Database Config
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Setup
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# JWT Configuration (read from environment)
travelsimulator.jwt.secret=${JWT_SECRET}
travelsimulator.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# API Settings (read from environment)
travelsimulator.weather.api-key=${WEATHER_API_KEY:}
travelsimulator.ai.provider=${LLM_PROVIDER:gemini}
travelsimulator.ai.api-key=${LLM_API_KEY:}

# File upload sizes
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
